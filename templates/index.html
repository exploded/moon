<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="description" content="A page to find the rise and set times of the moon for any location. Uses Google Maps to find your location.">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Moon Rise and Set Times</title>
	<link rel="stylesheet" href="static/styles.css">
</head>

<body>
	<div class="container">
		<header>
			<div class="header-row">
				<h1 class="header-title">🌙 Moon Rise and Set Times</h1>
				<div class="spacer"></div>
				<nav class="nav">
					<a class="nav-link current" href="/"><svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Home</a>
					<a class="nav-link" href="about">About</a>
					<a id="callink" class="nav-link" href="calendar">Calendar</a>
				</nav>
			</div>
		</header>
		<main>
			<div class="page-content">
				<div class="card">
					<div class="card-media">
						<div id="mapholder" role="application" aria-label="Interactive map for selecting location"></div>
					</div>
					<div class="card-content">
						<div class="form-section">
							<h3>Location</h3>
							<p class="form-instructions">Move the pin on the map to select your location</p>
							<div class="input-row">
								<div class="input-group">
									<label class="input-label" for="lat">Latitude</label>
								<input id="lat" type="number" pattern="-?[0-9]*(\.[0-9]+)?" min="-90" max="90" step="any" value="-37" aria-label="Latitude in decimal degrees" />
							</div>
							<div class="input-group">
								<label class="input-label" for="lon">Longitude</label>
								<input id="lon" type="number" pattern="-?[0-9]*(\.[0-9]+)?" min="-180" max="180" step="any" value="144" aria-label="Longitude in decimal degrees" />
							</div>
						</div>
						<div class="input-group">
						<label class="input-label" for="timezone">Timezone</label>
						<select id="timezone" aria-label="Select timezone">
							<option value="">Loading timezones...</option>
						</select>
						<input id="zon" type="hidden" value="" />
					</div>
				</div>

				<div class="results-section">
					<h3>Moon Times for Today</h3>
					<div class="result-item">
						<span class="result-label">🌄 Moonrise</span>
						<input id="Rise" readonly class="result-value" type="text" aria-label="Moon rise time" value="--:--" />
					</div>
					<div class="result-item">
						<span class="result-label">🌅 Moonset</span>
						<input id="Set" readonly class="result-value" type="text" aria-label="Moon set time" value="--:--" />
					</div>
				</div>

				<p id="errormessage" role="alert" aria-live="polite"></p>
			</div>
					<div class="card-actions">
						<button id="useMyLocationBtn" class="btn" aria-label="Reset location to browser location">
							<svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/></svg> Use My Location
						</button>
					</div>
				</div>
			</div>
		</main>
	</div>
	<script src="static/script.js"></script>
	<script src="https://maps.googleapis.com/maps/api/js?key={{.GoogleMapsKey}}&loading=async&callback=initMap&libraries=marker" async defer></script>
</body>

</html>
